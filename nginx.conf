upstream sotarq_school {
    # Aponta para o serviço 'web' definido no docker-stack.yml
    server web:8000;
    # Se uma réplica falhar 3 vezes em 30 segundos, fica suspensa por 30 segundos.
    server web:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name sotarqschool.com sotarqschool.ao sotarq.school www.sotarq.school;
    location / {
        return 301 https://$host$request_uri;
    }

    # Necessário para a renovação automática do Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name sotarqschool.com sotarqschool.ao sotarq.school www.sotarq.school;

    # Caminhos dos Certificados SSL (Gerados pelo Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sotarq.school/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sotarq.school/privkey.pem;

    # Otimização de Segurança SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    
    # Cabeçalhos de Segurança Enterprise
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';";

    # Gestão de Ficheiros Estáticos e Media
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
    }

    # Proxy para o Django (Gunicorn)
    location / {
        # AQUI É ONDE O NOME DEVE COINCIDIR
        proxy_pass http://sotarq_school; #aqui deve ser o nome do projecto?
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Aumentar timeout para relatórios pesados
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Limite de Upload (Fotos de Alunos e Documentos)
    client_max_body_size 10M;
}