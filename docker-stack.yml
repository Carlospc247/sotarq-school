version: '3.8'

services:
  web:
    image: registry.digitalocean.com/dotarqschool-saas/sotarq-school:latest
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # EM PRODUÇÃO: Use o link do Managed Database da DigitalOcean
      - DATABASE_URL=postgres://db_user:db_password@managed_db_host:25060/db_name
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
    networks:
      - sotarq_network
  services:
  # ... seus serviços existentes (web, worker, etc) ...

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - sotarq_network
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # Porta de acesso ao Dashboard (http://seu-ip:3000)
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sotarq_network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=SotarqAdmin2026! # Mude isto imediatamente
    deploy:
      replicas: 1

  node-exporter:
    image: prom/node-exporter:latest
    networks:
      - sotarq_network
    deploy:
      mode: global # Importante: Roda 1 cópia em CADA nó do servidor (se tiveres cluster)

  worker:
    image: registry.digitalocean.com/dotarqschool-saas/sotarq-school:latest
    command: celery -A sotarq_project worker -l info
    deploy:
      replicas: 2
    networks:
      - sotarq_network

  beat:
    image: registry.digitalocean.com/dotarqschool-saas/sotarq-school:latest
    command: celery -A sotarq_project beat -l info
    networks:
      - sotarq_network

  redis:
    image: redis:7-alpine
    networks:
      - sotarq_network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - sotarq_network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  sotarq_network:
    driver: overlay

volumes:
  static_volume:
  media_volume:
  prometheus_data:
  grafana_data