<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sotarq Status | Monitorização</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full" id="app">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-600 tracking-tighter">SOTARQ<span class="text-gray-900">STATUS</span></h1>
            <p class="text-gray-500 text-sm mt-2">Monitorização em tempo real da infraestrutura escolar</p>
        </div>

        <div id="status-card" class="bg-white rounded-3xl shadow-2xl p-8 border-t-8 transition-all">
            <div class="flex items-center justify-between mb-8">
                <span id="system-text" class="text-xl font-bold text-gray-800 tracking-tight italic">Verificando...</span>
                <div id="status-pulse" class="h-4 w-4 rounded-full animate-pulse"></div>
            </div>

            <div id="services-list" class="space-y-4">
                </div>

            <div class="mt-8 pt-6 border-t border-gray-100 flex justify-between items-center">
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Última Atualização</span>
                <span id="last-update" class="text-xs text-gray-500 font-mono">--:--:--</span>
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/static/status.json');
                const data = await response.json();
                
                document.getElementById('system-text').innerText = data.system_status;
                document.getElementById('status-card').style.borderTopColor = data.color === 'green' ? '#10b981' : '#ef4444';
                document.getElementById('status-pulse').style.backgroundColor = data.color === 'green' ? '#10b981' : '#ef4444';
                document.getElementById('last-update').innerText = data.last_update;

                const list = document.getElementById('services-list');
                list.innerHTML = data.services.map(s => `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                        <div class="flex items-center space-x-3">
                            <i class="fas ${s.icon} text-gray-400"></i>
                            <span class="text-sm font-bold text-gray-700">${s.name}</span>
                        </div>
                        <span class="text-[10px] font-black uppercase ${s.status === 'online' ? 'text-green-600' : 'text-red-600'}">
                            ${s.status}
                        </span>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Erro ao carregar status");
            }
        }
        fetchStatus();
        setInterval(fetchStatus, 60000); // Atualiza a cada 1 minuto
    </script>
</body>
</html>
