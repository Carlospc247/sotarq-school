{% for student in results %}
<a href="/students/profile/{{ student.id }}/" class="flex items-center p-4 hover:bg-gray-50 transition border-b border-gray-50 last:border-0">
    <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-4">
        {{ student.full_name|slice:":1" }}
    </div>
    <div class="flex-1">
        <p class="text-sm font-bold text-gray-900">{{ student.full_name }}</p>
        <p class="text-[10px] text-gray-500 uppercase font-semibold">Processo: {{ student.registration_number }}</p>
    </div>
    <div class="text-right">
        {% if student.is_active %}
            <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">ACTIVO</span>
        {% else %}
            <span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">INACTIVO</span>
        {% endif %}
    </div>
</a>
{% empty %}
<div class="p-4 text-center text-gray-500 text-sm">
    <i class="fas fa-search-minus mb-2 block text-gray-300 text-2xl"></i>
    Nenhum aluno encontrado com esses dados.
</div>
{% endfor %}
