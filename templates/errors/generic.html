{% extends 'public_base.html' %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center bg-white px-4">
    <div class="text-center max-w-lg">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-red-50 mb-6">
            <i data-feather="alert-triangle" class="w-10 h-10 text-red-500"></i>
        </div>
        
        <h1 class="text-4xl font-black text-slate-900 mb-2">{{ title|default:"Acesso Restrito" }}</h1>
        <p class="text-lg text-slate-500 mb-8 leading-relaxed">
            {{ message|default:"Não foi possível processar a sua solicitação no momento." }}
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-6 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors">
                Voltar ao Início
            </a>
            <a href="/portal/contact/" class="px-6 py-3 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition-colors">
                Contactar Suporte
            </a>
        </div>
    </div>
</div>
<script>feather.replace()</script>
{% endblock %}
