version: '3.8'

services:
  # 1. Banco de Dados (Opcional se usar Managed DB da DO, mas bom para backup local)
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=sotarq_db
      - POSTGRES_USER=sotarq_user
      - POSTGRES_PASSWORD=sotarq_password

  # 2. Redis (Para as tarefas do Celery)
  redis:
    image: redis:7-alpine

  # 3. Aplicação Django (Web)
  web:
    build: .
    command: gunicorn sotarq_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DATABASE_URL=postgres://sotarq_user:sotarq_password@db:5432/sotarq_db # aqui deve ser a passowrd do banco remoto?
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
    depends_on:
      - db
      - redis

  # 4. Celery Worker (Notificações WhatsApp e Faturação)
  worker:
    build: .
    command: celery -A sotarq_project worker -l info
    depends_on:
      - redis
      - db

  # 5. Celery Beat (Agendamento mensal de faturas)
  beat:
    build: .
    command: celery -A sotarq_project beat -l info
    depends_on:
      - redis
      - db

  # 6. Nginx (Servidor Web e Proxy)
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: