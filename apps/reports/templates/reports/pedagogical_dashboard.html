{% extends 'base_staff.html' %}

{% block content %}
<div class="p-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Curva de Rendimento Escolar</h3>
            <canvas id="gradeChart" height="250"></canvas>
        </div>

        <div class="lg:col-span-2 bg-slate-900 p-8 rounded-3xl text-white flex flex-col justify-center">
            <h2 class="text-3xl font-black mb-2">Análise Pedagógica BI</h2>
            <p class="text-slate-400">O gráfico ao lado indica se a avaliação da escola está equilibrada. Uma curva muito à esquerda indica rigor excessivo; muito à direita indica facilidade excessiva.</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('gradeChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0-5 (Mau)', '6-9 (Insuf.)', '10-13 (Satis.)', '14-17 (Bom)', '18-20 (Exc.)'],
            datasets: [{
                label: 'Nº de Alunos',
                data: {{ chart_data|safe }},
                backgroundColor: [
                    '#ef4444', // Red
                    '#f97316', // Orange
                    '#3b82f6', // Blue
                    '#10b981', // Emerald
                    '#8b5cf6'  // Violet
                ],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: True, grid: { display: false } },
                x: { grid: { display: false } }
            }
        }
    });
</script>
{% endblock %}
