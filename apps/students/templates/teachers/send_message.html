<div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 max-w-2xl mx-auto">
    <h2 class="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Nova Comunicação Pedagógica</h2>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Aluno Relacionado</label>
            <select name="student_id" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500">
                {% for student in class_students %}
                <option value="{{ student.id }}">{{ student.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Categoria</label>
                <select name="category" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl">
                    <option value="COMPLIMENT">Elogio</option>
                    <option value="INCIDENT">Ocorrência Disciplinar</option>
                    <option value="ACADEMIC">Alerta Académico</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Assunto</label>
                <input type="text" name="subject" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Ex: Participação em Aula">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mensagem</label>
            <textarea name="content" rows="4" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Descreva detalhadamente o ocorrido..."></textarea>
        </div>

        <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
            Enviar Comunicação e Notificar Encarregado
        </button>
    </form>
</div>
