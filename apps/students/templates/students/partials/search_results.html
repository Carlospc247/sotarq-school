<div class="absolute w-full bg-white border border-slate-200 rounded-2xl shadow-xl mt-2 overflow-hidden z-50">
    {% for student in results %}
    <div class="p-4 hover:bg-slate-50 border-b border-slate-50 flex items-center justify-between cursor-pointer">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center font-bold">
                {{ student.full_name|slice:":1" }}
            </div>
            <div>
                <p class="text-sm font-black text-slate-800">{{ student.full_name }}</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase">{{ student.registration_number }}</p>
            </div>
        </div>
        <div class="flex space-x-2">
            <a href="#" class="px-3 py-1 bg-slate-900 text-white text-[10px] font-black rounded-lg">Ficha</a>
            {% if student.is_suspended %}
                <span class="px-2 py-1 bg-red-100 text-red-600 text-[10px] font-black rounded-lg">SUSPENSO</span>
            {% endif %}
        </div>
    </div>
    {% empty %}
    <p class="p-4 text-center text-xs text-slate-400 italic">Nenhum aluno encontrado.</p>
    {% endfor %}
</div>
