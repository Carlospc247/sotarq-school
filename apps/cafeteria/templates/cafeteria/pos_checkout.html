{% extends 'base_cafetereia.html' %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 max-w-7xl mx-auto p-6">
    <div class="lg:col-span-2 space-y-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
            <h2 class="text-xl font-black uppercase italic mb-6">Ponto de Venda (POS)</h2>
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="setClient('student')" class="py-4 bg-indigo-50 border-2 border-indigo-600 rounded-2xl font-black text-indigo-700 text-xs uppercase">🎓 Estudante</button>
                    <button type="button" onclick="setClient('external')" class="py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-black text-slate-500 text-xs uppercase">👥 Staff/Visitante</button>
                </div>

                <input type="text" id="client_search" placeholder="Pesquisar Nome/NIF..." class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold">
                <input type="hidden" name="client_id" id="client_id">

                <div class="grid grid-cols-2 gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Enquadramento IVA</label>
                        <select name="tax_id" class="w-full mt-1 bg-transparent border-none font-bold text-sm">
                            {% for tax in taxes %}
                            <option value="{{ tax.id }}">{{ tax.tax_code }} ({{ tax.tax_percentage }}%)</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Desconto Aplicado (Kz)</label>
                        <input type="number" name="discount_value" 
                               {% if not user.current_role == 'ADMIN' %}readonly title="Apenas ADMIN"{% endif %} 
                               class="w-full mt-1 bg-transparent border-none font-bold text-sm text-red-500" value="0">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pagamento</label>
                    <select name="payment_method" class="w-full mt-2 p-4 bg-slate-900 text-white border-none rounded-2xl font-bold">
                        <option value="CASH">Dinheiro / Cash</option>
                        <option value="WALLET">Carteira SOTARQ</option>
                        <option value="MULTICAIXA">TPA / Multicaixa</option>
                    </select>
                </div>

                <button type="submit" class="w-full py-5 bg-emerald-500 text-white rounded-3xl font-black text-lg uppercase shadow-xl hover:scale-105 transition-all">
                    Finalizar e Emitir Venda
                </button>
            </form>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sessão: {{ request.user.username }}</p>
            <div class="mt-6 space-y-4">
                <div class="flex justify-between text-xs text-slate-400"><span>Fundo Maneio:</span><b>{{ session.opening_balance }} Kz</b></div>
                <div class="flex justify-between text-sm font-black"><span>Total Hoje:</span><b class="text-emerald-400">+ {{ session.get_today_total }} Kz</b></div>
            </div>
            <a href="{% url 'cafeteria:close_cash' %}" class="block text-center mt-8 py-3 bg-red-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-700">Fechar e Auditar Caixa</a>
            <i data-feather="terminal" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/5"></i>
        </div>
    </div>
</div>
{% endblock %}
