{% extends "base.html" %}
{% load static %}

{% block title %}Nova Conta Bancária | SOTARQ SCHOOL{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'finance:bank_accounts' %}" class="p-2 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-brand-600 hover:border-brand-200 transition-all shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
        </a>
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Registar Conta Bancária</h1>
            <p class="text-slate-500 text-sm">Adicione os detalhes bancários oficiais da instituição.</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 tracking-widest">Nome do Banco</label>
                    <input type="text" name="bank_name" maxlength="50" required 
                           placeholder="Ex: BAI, BFA, SOL..."
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all font-bold text-slate-700">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 tracking-widest">Número da Conta</label>
                    <input type="text" name="account_number" maxlength="30" required
                           placeholder="000.000.000"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all font-bold text-slate-700">
                </div>

                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black uppercase text-slate-500 tracking-widest">IBAN (Angola)</label>
                    <input type="text" name="iban" maxlength="25" required
                           placeholder="AO06..."
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all font-mono text-slate-700 tracking-tighter">
                </div>
            </div>

            <div class="flex items-center gap-3 p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                <input type="checkbox" name="is_active" id="id_is_active" checked
                       class="w-5 h-5 text-emerald-600 rounded border-emerald-300 focus:ring-emerald-500 cursor-pointer">
                <label for="id_is_active" class="text-sm font-bold text-emerald-800 uppercase cursor-pointer">Conta Ativa para Faturamento</label>
            </div>

            <hr class="border-slate-100">

            <div class="flex justify-end gap-3">
                <a href="{% url 'finance:bank_accounts' %}" class="px-6 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">
                    Cancelar
                </a>
                <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg hover:shadow-brand-200 active:scale-95">
                    Guardar Conta
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
