{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-plus-circle me-2"></i>
                    <h5 class="mb-0">Configurar Novo Item de Faturação</h5>
                </div>
                <form method="post" class="card-body">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">Nome do Serviço ou Produto</label>
                            <input type="text" name="name" class="form-control" placeholder="Ex: Mensalidade 10ª Classe, Uniforme Principal..." required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Categoria</label>
                            <select name="category" class="form-select" id="id_category">
                                {% for val, label in categories %}
                                    <option value="{{ val }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Preço Unitário (Kz)</label>
                            <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
                        </div>

                        <div class="col-12">
                            <div class="form-check form-switch p-3 bg-light rounded border">
                                <input class="form-check-input" type="checkbox" name="stock_controlled" id="stockSwitch">
                                <label class="form-check-label fw-bold" for="stockSwitch">
                                    Este item requer controlo de stock? (Ex: Uniformes, Manuais)
                                </label>
                            </div>
                        </div>

                        <div class="col-md-6" id="stock_input_container" style="display: none;">
                            <label class="form-label fw-bold text-danger">Quantidade Inicial em Stock</label>
                            <input type="number" name="current_stock" class="form-control" value="0">
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'finance:fee_list' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success px-4">
                            <i class="fas fa-save"></i> Gravar Item no Catálogo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica para mostrar/esconder campo de stock dinamicamente
    const stockSwitch = document.getElementById('stockSwitch');
    const stockContainer = document.getElementById('stock_input_container');

    stockSwitch.addEventListener('change', function() {
        if (this.checked) {
            stockContainer.style.display = 'block';
            stockContainer.querySelector('input').focus();
        } else {
            stockContainer.style.display = 'none';
        }
    });
</script>
{% endblock %}
