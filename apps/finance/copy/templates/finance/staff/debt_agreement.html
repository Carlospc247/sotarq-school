{% extends 'base_staff.html' %}

{% block content %}
<div class="max-w-5xl mx-auto" x-data="{ selectedInvoices: [], total: 0 }">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black text-gray-900 uppercase">Novo Acordo de Dívida</h1>
        <span class="bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-xs font-bold">RECUPERAÇÃO DE CRÉDITO</span>
    </div>

    <form action="{% url 'finance:process_agreement' student.id %}" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-8">
        {% csrf_token %}
        
        <div class="md:col-span-2 bg-white rounded-3xl shadow-sm border p-6">
            <h3 class="font-bold text-gray-700 mb-4">Selecione as faturas para consolidar:</h3>
            <div class="space-y-3">
                {% for inv in overdue_invoices %}
                <label class="flex items-center justify-between p-4 border rounded-2xl hover:bg-gray-50 cursor-pointer transition">
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" name="invoice_ids" value="{{ inv.id }}" 
                               @change="invTotal = {{ inv.calculate_current_total }}; $el.checked ? total += invTotal : total -= invTotal"
                               class="w-5 h-5 text-blue-600 rounded">
                        <div>
                            <p class="font-bold text-sm">{{ inv.number }}</p>
                            <p class="text-xs text-red-500">Vencido em {{ inv.due_date|date:"d/m/Y" }}</p>
                        </div>
                    </div>
                    <span class="font-black">{{ inv.calculate_current_total }} Kz</span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="bg-gray-900 rounded-3xl p-8 text-white h-fit sticky top-8">
            <p class="text-gray-400 text-xs uppercase font-bold mb-2">Total Consolidado</p>
            <h2 class="text-4xl font-black mb-6" x-text="total.toLocaleString() + ' Kz'">0 Kz</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400">Número de Prestações</label>
                    <input type="number" name="installments" min="1" value="1" class="w-full bg-gray-800 border-none rounded-xl p-3 text-white mt-1">
                </div>
                <div>
                    <label class="text-xs text-gray-400">Data da 1ª Prestação</label>
                    <input type="date" name="first_due_date" required class="w-full bg-gray-800 border-none rounded-xl p-3 text-white mt-1">
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition mt-6">
                    Gerar Acordo e Notificar
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
