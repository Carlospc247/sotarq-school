{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto p-6">
    <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl overflow-hidden">
        <div class="bg-red-600 p-8 text-white">
            <h2 class="text-xl font-black uppercase italic">Auditoria de Desperdício</h2>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mt-1">Conformidade Patrimonial SOTARQ</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-4 bg-red-50 rounded-2xl border border-red-100 text-red-600 text-xs font-bold">
                    Corrija os erros destacados abaixo.
                </div>
            {% endif %}

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase italic">Produto</label>
                {{ form.product }}
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Qtd. para Baixa</label>
                    {{ form.quantity }}
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Motivo</label>
                    {{ form.reason }}
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase">Justificativa Técnica</label>
                {{ form.description }}
            </div>

            <div class="p-6 border-2 border-dashed border-slate-200 rounded-[2rem] text-center bg-slate-50/50">
                <input type="file" name="photo_evidence" id="id_photo_evidence" accept="image/*" capture="environment" class="hidden">
                <label for="id_photo_evidence" class="cursor-pointer">
                    <i data-feather="camera" class="w-10 h-10 mx-auto text-red-400"></i>
                    <p class="text-xs font-black text-slate-500 uppercase mt-2">Fotografar Item Danificado</p>
                </label>
                <div id="file-name" class="text-[9px] text-indigo-500 font-bold mt-2"></div>
            </div>

            <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-xl">
                Autenticar e Baixar Stock
            </button>
        </form>
    </div>
</div>

<script>
    // Preview do nome do arquivo para UX Sênior
    document.getElementById('id_photo_evidence').onchange = function() {
        document.getElementById('file-name').innerHTML = "<i data-feather='check' class='inline w-3 h-3'></i> Imagem Capturada";
        feather.replace();
    };
</script>
{% endblock %}
