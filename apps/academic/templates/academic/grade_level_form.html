{% extends "base.html" %}

{% block title %}Novo Nível | SOTARQ SCHOOL{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden">
        <div class="p-8 border-b border-slate-100 dark:border-slate-700 bg-indigo-50/30">
            <h1 class="text-2xl font-black text-slate-900 dark:text-white flex items-center">
                <i data-feather="layers" class="w-6 h-6 mr-3 text-indigo-600"></i>
                Cadastrar Nível Académico
            </h1>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Nome do Nível (Ex: 10ª Classe)</label>
                {{ form.name }}
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Curso</label>
                {{ form.course }}
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Índice de Nível (Ordem Sequencial)</label>
                {{ form.level_index }}
                <p class="text-[10px] text-slate-400 mt-1 italic">Use 1 para o primeiro ano do curso, 2 para o segundo, etc.</p>
            </div>

            <div class="pt-6 flex items-center justify-end gap-4">
                <a href="{% url 'academic:grade_level_list' %}" class="px-6 py-3 text-sm font-bold text-slate-500">Cancelar</a>
                <button type="submit" class="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-1">
                    Salvar Nível
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
