<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado | Sotarq School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-slate-100">
        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
            <i class="fas fa-check-circle text-5xl"></i>
        </div>

        <h1 class="text-3xl font-black text-slate-900 mb-2 italic uppercase tracking-tighter">Pagamento Confirmado!</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">O seu acesso foi renovado com sucesso via GPO/Multicaixa. A sua escola já está totalmente operacional.</p>

        <div class="bg-slate-50 rounded-2xl p-6 mb-8 text-left border border-slate-100">
            <div class="flex justify-between mb-2">
                <span class="text-xs font-bold text-slate-400 uppercase">Estado da Licença</span>
                <span class="text-xs font-black text-green-600 uppercase">Ativa</span>
            </div>
            <div class="flex justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase">Nova Expiração</span>
                <span class="text-xs font-black text-slate-900">{{ new_expiry_date|date:"d/m/Y" }}</span>
            </div>
        </div>

        <div class="space-y-3">
            <a href="/dashboard/" class="block w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-slate-800 transition transform hover:scale-[1.02]">
                IR PARA A DASHBOARD
            </a>
            <p class="text-[10px] text-slate-400 font-medium">Você será redirecionado automaticamente em <span id="timer">5</span> segundos.</p>
        </div>
    </div>

    <script>
        let seconds = 5;
        const timerEl = document.getElementById('timer');
        const countdown = setInterval(() => {
            seconds--;
            timerEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "/dashboard/";
            }
        }, 1000);
    </script>
</body>
</html>
